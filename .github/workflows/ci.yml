name: OpsAI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx flake8

      - name: Run Linter (Flake8)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Backend Tests
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
          LLM_PROVIDER: ollama
          LLM_MODEL: mistral
          OLLAMA_URL: http://localhost:11434
          CHROMA_PATH: /tmp/chromadb_ci
          TRADE_KNOWLEDGE_CSV: data/sample_trade_knowledge.csv
        run: |
          cd backend && pytest tests/

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Validate TypeScript Compilation & Vite Build
        working-directory: frontend
        run: npm run build
